name: Devel

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write   # push container image to GHCR

jobs:
  # ---------------------------------------------------------------------------
  # Quick sanity check — vet + build (native only, no cross-compile overhead)
  # ---------------------------------------------------------------------------
  build:
    name: Build & vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

      - name: Build (native)
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          PKG=mcp-bridge/internal/version

          go build -trimpath \
            -ldflags="-s -w \
              -X ${PKG}.Version=devel \
              -X ${PKG}.GitCommit=${GIT_COMMIT} \
              -X ${PKG}.BuildDate=${BUILD_DATE}" \
            -o mcp-bridge \
            ./cmd/mcp-bridge

  # ---------------------------------------------------------------------------
  # Build and push (or repush) the "devel" container image to GHCR
  # ---------------------------------------------------------------------------
  docker:
    name: Container image (devel)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push devel image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7,linux/arm/v6
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
