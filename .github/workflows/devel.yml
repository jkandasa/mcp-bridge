name: Devel

on:
  push:
    branches:
      - main

permissions:
  contents: write   # create/update the devel pre-release tag
  packages: write   # push container image to GHCR

jobs:
  # ---------------------------------------------------------------------------
  # Vet
  # ---------------------------------------------------------------------------
  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Vet
        run: go vet ./...

  # ---------------------------------------------------------------------------
  # Build binaries for all target platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    needs: vet
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          PKG=mcp-bridge/internal/version

          go build -trimpath \
            -ldflags="-s -w \
              -X ${PKG}.Version=${{ github.ref_name }} \
              -X ${PKG}.GitCommit=${GIT_COMMIT} \
              -X ${PKG}.BuildDate=${BUILD_DATE}" \
            -o mcp-bridge${{ matrix.ext }} \
            ./cmd

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: tar -czf mcp-bridge-${{ matrix.suffix }}.tar.gz mcp-bridge

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: zip mcp-bridge-${{ matrix.suffix }}.zip mcp-bridge${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: mcp-bridge-${{ matrix.suffix }}.*

  # ---------------------------------------------------------------------------
  # Build and push the multi-arch container image to GHCR tagged as branch name
  # ---------------------------------------------------------------------------
  docker:
    name: Container image (${{ github.ref_name }})
    runs-on: ubuntu-latest
    needs: vet
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Publish a rolling "devel" pre-release on GitHub with all binaries
  # ---------------------------------------------------------------------------
  prerelease:
    name: Devel pre-release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Create or update devel pre-release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: devel
          name: devel
          prerelease: true
          body: |
            Rolling pre-release built from the `main` branch.
            Commit: ${{ github.sha }}
          files: mcp-bridge-*
