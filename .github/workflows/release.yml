name: Release

on:
  push:
    tags:
      - 'v1.*'

permissions:
  contents: write       # create GitHub releases and upload assets
  packages: write       # push container images to GHCR

jobs:
  # ---------------------------------------------------------------------------
  # Build binaries for all target platforms
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.suffix }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            suffix: linux-armv7
          - goos: windows
            goarch: amd64
            suffix: windows-amd64
            ext: .exe
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: "0"
        run: |
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          GIT_COMMIT=$(git rev-parse --short HEAD)
          PKG=mcp-bridge/internal/version

          go build -trimpath \
            -ldflags="-s -w \
              -X ${PKG}.Version=${{ github.ref_name }} \
              -X ${PKG}.GitCommit=${GIT_COMMIT} \
              -X ${PKG}.BuildDate=${BUILD_DATE}" \
            -o mcp-bridge${{ matrix.ext }} \
            ./cmd

      - name: Package (tar.gz)
        if: matrix.goos != 'windows'
        run: tar -czf mcp-bridge-${{ matrix.suffix }}.tar.gz mcp-bridge

      - name: Package (zip)
        if: matrix.goos == 'windows'
        run: zip mcp-bridge-${{ matrix.suffix }}.zip mcp-bridge${{ matrix.ext }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.suffix }}
          path: mcp-bridge-${{ matrix.suffix }}.*

  # ---------------------------------------------------------------------------
  # Build and push the multi-arch container image to GHCR
  # ---------------------------------------------------------------------------
  docker:
    name: Container image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_name }}
            GIT_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Create the GitHub Release with all binaries attached
  # ---------------------------------------------------------------------------
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all binaries
        uses: actions/download-artifact@v8
        with:
          pattern: binary-*
          merge-multiple: true

      - name: Extract changelog entry for this tag
        id: changelog
        run: |
          TAG=${{ github.ref_name }}
          NOTES=$(awk "/^## \[${TAG}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [CHANGELOG.md](CHANGELOG.md) for details."
          fi
          echo "$NOTES" > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: mcp-bridge-*
