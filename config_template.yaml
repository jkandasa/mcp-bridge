# mcp-bridge configuration template
# Copy this file to config.yaml and fill in your values.
# All server fields are optional — defaults are shown below.

# ---------------------------------------------------------------------------
# server — mcp-bridge listener and security settings
# ---------------------------------------------------------------------------
server:
  # Directory for persistent data (TLS certificates, etc.).
  # Created automatically if it does not exist.
  # Default: "./.mcp-bridge"
  data_dir: "./.mcp-bridge"

  # TCP address to listen on.  Format: "[host]:port"
  # Default: ":7575"
  addr: ":7575"

  # HTTP path for the MCP endpoint.
  # Default: "/mcp"
  path: "/mcp"

  # Minimum log severity: debug | info | warn | error
  # Use "debug" to print every raw JSON-RPC request and response.
  # Default: "info"
  log_level: "info"

  # Bearer token required on every incoming request.
  # Leave empty (or omit) to allow any client to connect.
  # Clients must send:  Authorization: Bearer <token>
  # Generate a token:   openssl rand -hex 32
  # auth_token: "your-secret-token-here"

  # ---------------------------------------------------------------------------
  # TLS — enable HTTPS (pick one mode or omit for plain HTTP)
  # ---------------------------------------------------------------------------

  # Mode 1: custom PEM certificate and key files
  # tls:
  #   cert_file: /etc/mcp-bridge/tls/server.crt
  #   key_file:  /etc/mcp-bridge/tls/server.key

  # Mode 2: auto-generated self-signed P-256 certificate (in memory, no files)
  #         Useful for development or internal networks.
  #         Clients must trust or skip verification of the certificate.
  # tls:
  #   auto_cert: true

# ---------------------------------------------------------------------------
# servers — MCP servers to bridge to the HTTP endpoint
# ---------------------------------------------------------------------------
# Three modes are supported per entry.  Exactly one of "command" (stdio),
# "url" (network), or "local" must be set.
#
# Tools are namespaced as:  <name>_<original_tool_name>
# Example: server name "git", tool "status"  →  unified name "git_status"
#
# Rules for all modes:
#   - name  must be unique across all servers
#
# ---------------------------------------------------------------------------
# Mode A: stdio — launch a local binary as a subprocess
# ---------------------------------------------------------------------------
# The process is started by mcp-bridge and restarted automatically with
# exponential back-off (500 ms → 30 s) if it crashes.
#
#   name     required  unique identifier
#   command  required  absolute path or PATH-resolvable binary
#   args     optional  command-line arguments for the binary
#   env      optional  KEY=VALUE pairs added to the child environment
#             (child inherits mcp-bridge's environment first)
#
# ---------------------------------------------------------------------------
# Mode B: network — connect to a remote HTTP(S) MCP server
# ---------------------------------------------------------------------------
# The remote server must already be running and reachable.  mcp-bridge will
# retry the connection in the background if it is unreachable at startup.
#
#   name             required  unique identifier
#   url              required  HTTP(S) MCP endpoint, e.g. http://host:9000/mcp
#   headers          optional  HTTP headers sent on every request (auth, etc.)
#   retry_interval   optional  delay between reconnection attempts (default: 30s)
#   request_timeout  optional  per-request HTTP timeout               (default: 30s)
#   insecure         optional  disable TLS certificate verification    (default: false)
#                              set to true only when the remote uses a self-signed or
#                              otherwise untrusted certificate
#
# MCP session management (Mcp-Session-Id) and protocol version headers are
# proxied transparently between the parent client and the remote server.
# SSE (text/event-stream) responses are parsed automatically.
# A long-lived GET stream is opened after connect to receive server-initiated
# notifications (e.g. tools/list_changed triggers an automatic refresh).
#
# ---------------------------------------------------------------------------
# Mode C: local — expose shell commands and HTTP requests as tools
# ---------------------------------------------------------------------------
# Tools are defined entirely in config — no external process or server needed.
# Each tool is either an exec command (set "command") or an HTTP call (set
# "url").
#
#   name     required  unique identifier
#   timeout  optional  default timeout for all tools in this block (default: 30s)
#                      individual tools may override this with their own timeout
#
#   local[].tool         required  tool name (unique within server)
#   local[].description  optional  shown to MCP clients
#   local[].timeout      optional  overrides the server-level default for this tool
#   local[].params       optional  named parameters (see below); when set, enables
#                                  {{name}} template substitution
#
#   exec mode (set "command"):
#     local[].command  required  command line — string OR list of strings.
#                                String: "ls -alh {{path}}"  → tokens split on whitespace.
#                                List:   ["sh", "-c", "cmd | wc -l"]  → tokens as given.
#                                Use list form when a token contains spaces or you need
#                                an explicit shell pipeline.
#                                Shell metacharacters (|, &, ;, >, etc.) in STRING form
#                                cause the entire string to run via sh -c automatically.
#                                List form always executes directly — no metachar detection.
#                                Tools without params accept no runtime arguments.
#
#   http mode (set "url"):
#     local[].url      required  HTTP endpoint; supports {{name}} placeholders
#     local[].method   optional  HTTP method (default: GET)
#     local[].headers  optional  HTTP headers; values support {{name}} placeholders
#     local[].body     optional  request body; supports {{name}} placeholders
#
#   params — named parameters for {{name}} template substitution:
#     params[].name         required  parameter name (used as {{name}} in templates)
#     params[].description  optional  shown to MCP clients in the tool input schema
#     params[].type         optional  string (default) | array | integer | number | boolean
#                                     array type: standalone {{name}} token expands to N
#                                     arguments; embedded {{name}} joins with commas
#     params[].required     optional  mark the parameter as required (default: false)

servers:
# Uncomment and configure each server you want to enable.

